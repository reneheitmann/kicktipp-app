name: Docker Image bauen und veröffentlichen

# Baut bei jedem Push nach main automatisch ein neues Docker-Image und lädt
# es zur GitHub Container Registry hoch. Auf Unraid zieht Watchtower dieses
# Image periodisch und startet den Container neu, sobald ein neues Image
# verfügbar ist – kein manueller Schritt auf dem Server nötig.
#
# Erhöht dabei automatisch die Patch-Version in package.json (z. B. 1.1.0 ->
# 1.1.1), außer package.json wurde im selben Push bereits selbst geändert
# (z. B. um bewusst auf eine neue Minor-/Major-Version zu springen, wie den
# Sprung auf 1.1.0) – dann bleibt die manuell gesetzte Version unangetastet.
# Der Versions-Bump wird mit "[skip ci]" zurückcommitted, damit das keinen
# weiteren Workflow-Lauf auslöst (von GitHub Actions nativ unterstützt).

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch-Version automatisch erhöhen
        id: bump
        run: |
          if [ -n "${{ github.event.before }}" ] \
            && git cat-file -e "${{ github.event.before }}" 2>/dev/null \
            && git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -qx "package.json"; then
            echo "package.json wurde in diesem Push bereits manuell geändert – keine automatische Erhöhung."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
            echo "Version erhöht: $CURRENT -> $NEW_VERSION"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Build-Metadaten ermitteln
        id: meta
        run: |
          echo "commit_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Image bauen und veröffentlichen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_APP_COMMIT_SHA=${{ steps.meta.outputs.commit_sha }}
            VITE_APP_BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Versions-Bump zurück ins Repo committen
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version") [skip ci]"
          git push
