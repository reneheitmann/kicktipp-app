name: Docker Image bauen und veröffentlichen

# Baut bei jedem Push nach main ODER beta automatisch ein neues Docker-Image
# und lädt es zur GitHub Container Registry hoch:
#   main -> Tags :latest und :<sha>       (Produktion, Watchtower zieht :latest)
#   beta -> Tags :beta und :beta-<sha>    (zweiter Unraid-Container zum Testen)
# Auf Unraid zieht Watchtower das jeweilige Image periodisch und startet den
# Container neu, sobald ein neues verfügbar ist – kein manueller Schritt nötig.
#
# Nur auf main wird zusätzlich automatisch die Version in package.json
# erhöht, außer package.json wurde im selben Push bereits selbst geändert
# (z. B. um bewusst auf eine neue Major-Version zu springen) – dann bleibt
# die manuell gesetzte Version unangetastet. Enthält der Push neue Dateien
# unter supabase/migrations/ (also ein DB-Update), wird die MINOR-Version
# erhöht (z. B. 1.1.9 -> 1.2.0), sonst nur die Patch-Version (z. B.
# 1.1.9 -> 1.1.10) – so ist an der Versionsnummer selbst ablesbar, ob ein
# Release ein Datenbank-Update enthielt. Der Versions-Bump wird mit
# "[skip ci]" zurückcommitted, damit das keinen weiteren Workflow-Lauf
# auslöst (von GitHub Actions nativ unterstützt).
#
# Beta-Builds bumpen package.json bewusst NIE (würde bei jedem Merge mit main
# zu Versions-Konflikten in der Datei führen) – stattdessen hängt vite.config.ts
# an die zuletzt von main gemergte Versionsnummer "_beta.<Commit-Anzahl auf
# beta>" an, sodass die angezeigte Version trotzdem bei jedem Beta-Push sichtbar
# hochzählt (z. B. "1.1.7_beta.42").
#
# Lint (oxlint) und Tests (vitest) laufen vor dem eigentlichen Image-Build und
# blockieren ihn bei Fehlern – zuvor prüfte die Pipeline nur implizit über
# `tsc -b` als Teil von `npm run build` innerhalb des Dockerfiles, oxlint-
# Verstöße blieben dadurch folgenlos.

on:
  push:
    branches: [main, beta]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Lint prüfen
        run: npm run lint

      - name: Tests ausführen
        run: npm run test

      - name: Version automatisch erhöhen (nur main)
        id: bump
        if: github.ref == 'refs/heads/main'
        run: |
          CURRENT=$(node -p "require('./package.json').version")

          # Nur das version-Feld selbst zählt als "bereits manuell geändert"
          # (z. B. bewusster Sprung auf eine neue Major-Version) – ein reiner
          # `git diff --name-only`-Check auf die ganze Datei würde hier
          # fälschlich auch dann greifen, wenn package.json sich aus anderem
          # Grund geändert hat (z. B. eine von beta gemergte neue
          # devDependency), und den Bump dann stumm überspringen.
          PREVIOUS_VERSION=""
          if [ -n "${{ github.event.before }}" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            PREVIOUS_VERSION=$(git show "${{ github.event.before }}:package.json" | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).version))" 2>/dev/null || echo "")
          fi

          if [ -n "$PREVIOUS_VERSION" ] && [ "$PREVIOUS_VERSION" != "$CURRENT" ]; then
            echo "version-Feld wurde in diesem Push bereits manuell geändert ($PREVIOUS_VERSION -> $CURRENT) – keine automatische Erhöhung."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            HAS_NEW_MIGRATION=false
            if [ -n "${{ github.event.before }}" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
              if git diff --name-only --diff-filter=A "${{ github.event.before }}" "${{ github.sha }}" -- supabase/migrations/ | grep -q .; then
                HAS_NEW_MIGRATION=true
              fi
            fi

            if [ "$HAS_NEW_MIGRATION" = true ]; then
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              echo "Neue DB-Migration erkannt – Minor-Version erhöht: $CURRENT -> $NEW_VERSION"
            else
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              echo "Version erhöht: $CURRENT -> $NEW_VERSION"
            fi

            npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Build-Metadaten ermitteln
        id: meta
        run: |
          echo "commit_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: main-Historie nachladen (für Versions-Changelog)
        # .github/scripts/generate-changelog.cjs braucht origin/main als
        # verlässliche Versions-Historie, auch wenn dieser Build auf beta
        # läuft (dessen eigene Historie Mains spätere Bump-Commits nicht
        # enthält – beta wird nie in main zurückgemerged, nur umgekehrt).
        run: git fetch origin main

      - name: Änderungsprotokoll ermitteln
        id: changelog
        run: |
          JSON=$(node .github/scripts/generate-changelog.cjs)
          # Base64 statt roher Einbettung: der Wert landet unten ungeschützt in
          # der build-args-YAML – Anführungszeichen/Zeilenumbrüche in
          # Commit-Nachrichten (im JSON enthalten) würden das sonst brechen.
          # AboutPage.tsx decodiert per atob() wieder.
          ENCODED=$(printf '%s' "$JSON" | base64 | tr -d '\n')
          echo "changelog=$ENCODED" >> "$GITHUB_OUTPUT"

      - name: Image-Tags bestimmen
        id: tags
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            {
              echo "tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "channel=production" >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:beta"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:beta-${{ github.sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            # Gesamtzahl der Commits auf beta als "hochzählende" Versionszahl,
            # da package.json hier nie gebumpt wird (siehe vite.config.ts).
            echo "beta_build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
            # Zuletzt tatsächlich veröffentlichte Version aus origin/mains
            # package.json (NICHT dem lokalen, das auf beta nie aktualisiert
            # wird) – Basis für die "_beta.<n>"-Anzeige, siehe vite.config.ts.
            echo "beta_base_version=$(git show origin/main:package.json | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).version))")" >> "$GITHUB_OUTPUT"
          fi

      - name: Image bauen und veröffentlichen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_APP_COMMIT_SHA=${{ steps.meta.outputs.commit_sha }}
            VITE_APP_BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VITE_APP_CHANNEL=${{ steps.tags.outputs.channel }}
            VITE_APP_CHANGELOG=${{ steps.changelog.outputs.changelog }}
            VITE_APP_BETA_BUILD_NUMBER=${{ steps.tags.outputs.beta_build_number }}
            VITE_APP_BETA_BASE_VERSION=${{ steps.tags.outputs.beta_base_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Versions-Bump zurück ins Repo committen
        if: github.ref == 'refs/heads/main' && steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version") [skip ci]"
          git push
